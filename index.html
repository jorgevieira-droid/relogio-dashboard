<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relógio Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    /* ── Scanline overlay ── */
    .wrapper::before {
      content: '';
      position: absolute;
      inset: -20px;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* ── Glow container ── */
    .clock-container {
      position: relative;
      padding: 18px 32px 14px;
      border: 1px solid rgba(0, 220, 180, 0.35);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 18px rgba(0, 220, 180, 0.18),
        0 0 60px rgba(0, 220, 180, 0.06),
        inset 0 0 20px rgba(0,0,0,0.4);
    }

    /* corner accents */
    .clock-container::before,
    .clock-container::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: #00dcb4;
      border-style: solid;
    }
    .clock-container::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .clock-container::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* ── Time digits ── */
    #time {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: 0.12em;
      color: #00ffda;
      text-shadow:
        0 0 8px rgba(0, 255, 218, 0.9),
        0 0 24px rgba(0, 255, 218, 0.5),
        0 0 60px rgba(0, 255, 218, 0.2);
      line-height: 1;
      position: relative;
    }

    /* blinking colon */
    #colon {
      display: inline-block;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    /* ── Date row ── */
    #date {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 1.4vw, 0.85rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(0, 220, 180, 0.65);
      text-align: center;
      margin-top: 4px;
    }

    /* ── Thin progress bar (seconds) ── */
    .seconds-bar-track {
      width: 100%;
      height: 2px;
      background: rgba(0,220,180,0.12);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }
    #seconds-bar {
      height: 100%;
      background: linear-gradient(90deg, #00b894, #00ffda);
      border-radius: 2px;
      transition: width 0.25s linear;
      box-shadow: 0 0 6px rgba(0,255,218,0.7);
    }

    /* ── Ambient pulse ring ── */
    .pulse-ring {
      position: absolute;
      inset: -28px;
      border-radius: 6px;
      border: 1px solid rgba(0,220,180,0.08);
      animation: pulse-ring 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulse-ring {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.012); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="pulse-ring"></div>
    <div class="clock-container">
      <div id="time">00<span id="colon">:</span>00<span id="colon2">:</span>00</div>
      <div class="seconds-bar-track">
        <div id="seconds-bar" style="width:0%"></div>
      </div>
    </div>
    <div id="date"></div>
  </div>

  <script>
    const DAYS   = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      const h = pad(now.getHours());
      const m = pad(now.getMinutes());
      const s = pad(now.getSeconds());

      document.getElementById('time').innerHTML =
        `${h}<span id="colon">:</span>${m}<span id="colon2">:</span>${s}`;

      const dayName  = DAYS[now.getDay()];
      const day      = pad(now.getDate());
      const month    = MONTHS[now.getMonth()];
      const year     = now.getFullYear();
      document.getElementById('date').textContent =
        `${dayName}  ·  ${day} ${month} ${year}`;

      const pct = (now.getSeconds() / 59) * 100;
      document.getElementById('seconds-bar').style.width = pct + '%';
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
