<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relógio Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    #ghost-cursor {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }

    .wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .wrapper::before {
      content: '';
      position: absolute;
      inset: -20px;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .clock-container {
      position: relative;
      padding: 18px 32px 14px;
      border: 1px solid rgba(0, 220, 180, 0.35);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 18px rgba(0, 220, 180, 0.18),
        0 0 60px rgba(0, 220, 180, 0.06),
        inset 0 0 20px rgba(0,0,0,0.4);
    }

    .clock-container::before,
    .clock-container::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: #00dcb4;
      border-style: solid;
    }
    .clock-container::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .clock-container::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    #time {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: 0.12em;
      color: #00ffda;
      text-shadow:
        0 0 8px rgba(0, 255, 218, 0.9),
        0 0 24px rgba(0, 255, 218, 0.5),
        0 0 60px rgba(0, 255, 218, 0.2);
      line-height: 1;
    }

    #colon {
      display: inline-block;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    #date {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 1.4vw, 0.85rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(0, 220, 180, 0.65);
      text-align: center;
      margin-top: 4px;
    }

    .seconds-bar-track {
      width: 100%;
      height: 2px;
      background: rgba(0,220,180,0.12);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }
    #seconds-bar {
      height: 100%;
      background: linear-gradient(90deg, #00b894, #00ffda);
      border-radius: 2px;
      transition: width 0.25s linear;
      box-shadow: 0 0 6px rgba(0,255,218,0.7);
    }

    .pulse-ring {
      position: absolute;
      inset: -28px;
      border-radius: 6px;
      border: 1px solid rgba(0,220,180,0.08);
      animation: pulse-ring 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulse-ring {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.012); }
    }

    #status {
      position: fixed;
      bottom: 8px;
      right: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      color: rgba(0,220,180,0.3);
      letter-spacing: 0.1em;
    }
    #status-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #00ffda;
      margin-right: 4px;
      vertical-align: middle;
      animation: dot-pulse 2s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div id="ghost-cursor"></div>

  <div class="wrapper">
    <div class="pulse-ring"></div>
    <div class="clock-container">
      <div id="time">00<span id="colon">:</span>00<span id="colon2">:</span>00</div>
      <div class="seconds-bar-track">
        <div id="seconds-bar" style="width:0%"></div>
      </div>
    </div>
    <div id="date"></div>
  </div>

  <div id="status"><span id="status-dot"></span>KEEP-ALIVE ATIVO</div>

  <script>
    /* ── 1. RELÓGIO (GMT-3 — São Paulo/Brasília) ── */
    const TZ = 'America/Sao_Paulo';

    function nowInSP() {
      // Usa Intl para obter os componentes de data/hora no fuso de São Paulo
      const f = new Intl.DateTimeFormat('pt-BR', {
        timeZone: TZ,
        hour:   '2-digit', minute: '2-digit', second: '2-digit',
        weekday:'long', day: '2-digit', month: 'short', year: 'numeric',
        hour12: false
      });
      const parts = Object.fromEntries(f.formatToParts(new Date()).map(p => [p.type, p.value]));
      return parts;
    }

    function tick() {
      const p = nowInSP();
      document.getElementById('time').innerHTML =
        `${p.hour}<span id="colon">:</span>${p.minute}<span id="colon2">:</span>${p.second}`;

      // Capitaliza o dia da semana e formata a data
      const weekday = p.weekday.charAt(0).toUpperCase() + p.weekday.slice(1);
      const month   = p.month.replace('.','').charAt(0).toUpperCase() + p.month.replace('.','').slice(1);
      document.getElementById('date').textContent =
        `${weekday}  ·  ${p.day} ${month} ${p.year}`;

      document.getElementById('seconds-bar').style.width =
        ((parseInt(p.second) / 59) * 100) + '%';
    }
    tick();
    setInterval(tick, 1000);

    /* ── 2. GHOST CURSOR — movimento senoidal invisível ── */
    const ghost = document.getElementById('ghost-cursor');
    let t = 0;
    function moveGhost() {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      const x  = cx + (cx * 0.6) * Math.sin(t);
      const y  = cy + (cy * 0.3) * Math.sin(t * 1.7);
      ghost.style.left = x + 'px';
      ghost.style.top  = y + 'px';
      try {
        document.dispatchEvent(new MouseEvent('mousemove', {
          bubbles: true, cancelable: true, clientX: x, clientY: y
        }));
      } catch(e) {}
      t += 0.04;
    }
    setInterval(moveGhost, 500);

    /* ── 3. WAKE LOCK API ── */
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { await navigator.wakeLock.request('screen'); } catch(e) {}
      }
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    /* ── 4. PING DE REDE a cada 30s ── */
    function networkPing() {
      fetch('https://www.google.com/generate_204', {
        mode: 'no-cors', cache: 'no-store'
      }).catch(() => {});
    }
    setInterval(networkPing, 30000);
    networkPing();

    /* ── 5. AUDIO CONTEXT SILENCIOSO ── */
    try {
      const ac   = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      gain.gain.value = 0;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
    } catch(e) {}

    /* ── 6. SCROLL SINTÉTICO a cada 2min ── */
    setInterval(() => {
      window.scrollBy(0, 1);
      setTimeout(() => window.scrollBy(0, -1), 300);
    }, 120000);
  </script>
</body>
</html>
